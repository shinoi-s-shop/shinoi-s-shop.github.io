<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Orders</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#131921;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:20px auto;
padding:15px;
}

.order{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.back{
display:inline-block;
margin-top:20px;
padding:10px 20px;
background:#ff9900;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>

</head>
<body>

<header>
📦 Manage Orders
</header>

<div class="container">

<div id="orderList">
<p>No Orders Found.</p>
</div>

<a href="admin.html" class="back">
⬅ Back to Admin Panel
</a>

</div>
  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
  getDatabase,
  ref,
  get,
  update,
  remove
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwEqOjrZwN56MGRsMrA_BUjHWSnkvmecM",
  authDomain: "shinoi-s-shop.firebaseapp.com",
  databaseURL: "https://shinoi-s-shop-default-rtdb.firebaseio.com",
  projectId: "shinoi-s-shop",
  storageBucket: "shinoi-s-shop.firebasestorage.app",
  messagingSenderId: "349772060842",
  appId: "1:349772060842:web:1dbd365d526c0a28e2d8d3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.updateStatus = async function(id){

  await update(ref(db,"orders/"+id),{
    status:"Completed"
  });

  alert("Status Updated");
  location.reload();

};

window.deleteOrder = async function(id){

  if(confirm("Delete this order?")){

    await remove(ref(db,"orders/"+id));

    alert("Order Deleted");
    location.reload();

  }

};

const orderList = document.getElementById("orderList");

const snapshot = await get(ref(db,"orders"));

if(!snapshot.exists()){

  orderList.innerHTML="<p>No Orders Found.</p>";

}else{

  orderList.innerHTML="";

  snapshot.forEach(child=>{

    const key=child.key;
    const order=child.val();

    let products="";

    order.products.forEach(item=>{

      products+=`
      <p>
      <b>${item.name}</b> × ${item.quantity}
      - ৳${item.price}
      </p>
      `;

    });

    orderList.innerHTML+=`

    <div class="order">

      <h3>Order ID: ${key}</h3>

      <p><b>Date:</b> ${order.date}</p>
      <p><b>Name:</b> ${order.customer.name}</p>
      <p><b>Phone:</b> ${order.customer.phone}</p>
      <p><b>Address:</b> ${order.customer.address}</p>
      <p><b>Payment:</b> ${order.customer.payment}</p>
      <p><b>Total:</b> ৳${order.customer.grandTotal}</p>
      <p><b>Status:</b> ${order.status}</p>

      <hr>

      ${products}

      <br>

      <button onclick="updateStatus('${key}')"
      style="padding:8px 15px;background:green;color:white;border:none;border-radius:5px;cursor:pointer;">
      ✅ Complete
      </button>

      <button onclick="deleteOrder('${key}')"
      style="padding:8px 15px;background:red;color:white;border:none;border-radius:5px;cursor:pointer;margin-left:10px;">
      🗑 Delete
      </button>

    </div>

    `;

  });

}

  </script>
</body>
</html>
