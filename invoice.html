<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:20px;
color:#1565c0;
}

.info p{
margin:8px 0;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th,
table td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

table th{
background:#1565c0;
color:#fff;
}

.total{
margin-top:20px;
text-align:right;
font-size:20px;
font-weight:bold;
}

.btn{
display:block;
margin-top:20px;
text-align:center;
padding:12px;
background:#1565c0;
color:#fff;
text-decoration:none;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h1>Invoice</h1>

<div class="info">

<p><b>Order ID:</b> <span id="orderId"></span></p>

<p><b>Name:</b> <span id="name"></span></p>

<p><b>Phone:</b> <span id="phone"></span></p>

<p><b>Address:</b> <span id="address"></span></p>

<p><b>Payment:</b> <span id="payment"></span></p>

</div>

<table>

<thead>

<tr>

<th>Product</th>

<th>Qty</th>

<th>Price</th>

<th>Total</th>

</tr>

</thead>

<tbody id="items">

</tbody>

</table>

<div class="total">

Grand Total: ৳<span id="grandTotal"></span>

</div>

<a href="index.html" class="btn">
🏠 Back to Home
</a>

<script>

let order = JSON.parse(localStorage.getItem("lastOrder"));

if(!order){
    alert("No Invoice Found!");
    window.location.href = "index.html";
}

document.getElementById("orderId").innerText = order.id;
document.getElementById("name").innerText = order.customer.name;
document.getElementById("phone").innerText = order.customer.phone;
document.getElementById("address").innerText = order.customer.address;
document.getElementById("payment").innerText = order.payment;

let items = document.getElementById("items");

let productTotal = 0;

order.products.forEach(item=>{

    let qty = item.quantity || 1;
    let total = item.price * qty;

    productTotal += total;

    items.innerHTML += `
    <tr>
        <td>${item.name}</td>
        <td>${qty}</td>
        <td>৳${item.price}</td>
        <td>৳${total}</td>
    </tr>
    `;

});

// Product Total
items.innerHTML += `
<tr>
    <td colspan="3"><b>Product Total</b></td>
    <td><b>৳${productTotal}</b></td>
</tr>
`;

// Delivery Charge
items.innerHTML += `
<tr>
    <td colspan="3"><b>Delivery Charge</b></td>
    <td><b>৳${order.shipping}</b></td>
</tr>
`;

// Grand Total
items.innerHTML += `
<tr>
    <td colspan="3"><b>Grand Total</b></td>
    <td><b>৳${order.total}</b></td>
</tr>
`;

</script>

</div>

</body>
</html>
