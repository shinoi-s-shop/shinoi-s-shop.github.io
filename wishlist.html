<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist - Bangla Mart</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#ff4d4d;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
}

.card img{
width:120px;
height:120px;
object-fit:cover;
margin-bottom:10px;
}

button{
background:#ff4d4d;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e60000;
}

.back{
display:block;
text-align:center;
margin:20px;
text-decoration:none;
font-size:18px;
color:#ff4d4d;
font-weight:bold;
}
</style>

</head>
<body>

<header>❤️ My Wishlist</header>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/120" alt="Product">
<h3>Product Name</h3>
<p>৳999</p>
<button>Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/120" alt="Product">
<h3>Another Product</h3>
<p>৳1499</p>
<button>Add to Cart</button>
</div>

</div>

<a href="index.html" class="back">⬅ Back to Home</a>

</body>
</html>
