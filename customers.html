<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#131921;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:1000px;
margin:20px auto;
padding:15px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card h3{
margin-bottom:10px;
color:#1565c0;
}

.card p{
margin:6px 0;
font-size:16px;
}

.back{
display:block;
width:220px;
margin:20px auto;
text-align:center;
padding:12px;
background:#ff9900;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

</style>

</head>
<body>

<header>Customers</header>

<div class="container" id="customerList"></div>

<a href="admin.html" class="back">⬅ Back to Dashboard</a>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let customerMap = {};

orders.forEach(order=>{

let phone = order.customer.phone;

if(!customerMap[phone]){

customerMap[phone] = {
name: order.customer.name,
phone: order.customer.phone,
address: order.customer.address,
orders: 1
};

}else{

customerMap[phone].orders++;

}

});

let list = document.getElementById("customerList");

if(Object.keys(customerMap).length===0){

list.innerHTML="<h2>No Customers Found!</h2>";

}else{

for(let phone in customerMap){

let c = customerMap[phone];

list.innerHTML += `

<div class="card">

<h3>${c.name}</h3>

<p><b>Phone:</b> ${c.phone}</p>

<p><b>Address:</b> ${c.address}</p>

<p><b>Total Orders:</b> ${c.orders}</p>

</div>

`;

}

}

</script>

</body>
</html>
