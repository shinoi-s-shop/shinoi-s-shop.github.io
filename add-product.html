<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Product</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#131921;
color:#fff;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:600px;
margin:25px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#ff9900;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#e68a00;
}

.back{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#1565c0;
font-weight:bold;
}

</style>

</head>

<body>

<header>
➕ Add Product
</header>

<div class="container">

<input type="text" id="name" placeholder="Product Name">

<input type="number" id="price" placeholder="Product Price">

<input type="file" id="image" accept="image/*">

<select id="category">
<option value="">Select Category</option>
<option>Mobile</option>
<option>Laptop</option>
<option>Watch</option>
<option>Shoes</option>
<option>Headphone</option>
<option>Bag</option>
</select>

<textarea id="description" placeholder="Product Description"></textarea>

<button onclick="saveProduct()">
💾 Save Product
</button>

<a href="admin.html" class="back">
⬅ Back to Admin Panel
</a>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
  getDatabase,
  ref,
  push
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCwEqOjrZwN56MGRsMrA_BUjHWSnkvmecM",
  authDomain: "shinoi-s-shop.firebaseapp.com",
  databaseURL: "https://shinoi-s-shop-default-rtdb.firebaseio.com",
  projectId: "shinoi-s-shop",
  storageBucket: "shinoi-s-shop.firebasestorage.app",
  messagingSenderId: "349772060842",
  appId: "1:349772060842:web:1dbd365d526c0a28e2d8d3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Cloudinary
const CLOUD_NAME = "ytxodtlc";
const UPLOAD_PRESET = "shinoi-s-shop";

 window.saveProduct = async function () {

  const name = document.getElementById("name").value.trim();
  const price = document.getElementById("price").value.trim();
  const file = document.getElementById("image").files[0];
  const category = document.getElementById("category").value;
  const description = document.getElementById("description").value.trim();

  if (!name || !price || !file || !category) {
    alert("Please fill all required fields!");
    return;
  }

  try {

    // Upload image to Cloudinary
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", UPLOAD_PRESET);

    const response = await fetch(
      `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
      {
        method: "POST",
        body: formData
      }
    );

    const data = await response.json();

    if (!data.secure_url) {
      alert("Image upload failed!");
      return;
    }

    const product = {
      id: Date.now(),
      name: name,
      price: Number(price),
      image: data.secure_url,
      category: category,
      description: description
    };

    await push(ref(db, "products"), product);

    alert("✅ Product Added Successfully!");

    document.getElementById("name").value = "";
    document.getElementById("price").value = "";
    document.getElementById("image").value = "";
    document.getElementById("category").value = "";
    document.getElementById("description").value = "";

    location.reload();

  } catch (error) {
    console.error(error);
    alert("Error: " + error.message);
  }

};

</script>

</body>
</html>
