<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#131921;
color:#fff;
padding:15px;
text-align:center;
font-size:24px;
}

.container{
max-width:500px;
margin:30px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#ff9900;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
background:#f8f8f8;
border-radius:8px;
display:none;
}

.status{
font-size:22px;
font-weight:bold;
color:#1565c0;
}
</style>

</head>
<body>

<header>📦 Track Your Order</header>

<div class="container">

<input
type="text"
id="orderId"
placeholder="Enter Order ID">

<button onclick="trackOrder()">
Track Order
</button>

<div class="result" id="result">

<h3>Order Details</h3>

<p><b>Order ID:</b> <span id="showId"></span></p>

<p><b>Status:</b></p>

<p class="status" id="showStatus"></p>

</div>

</div>

<script src="track.js"></script>

</body>
</html>
