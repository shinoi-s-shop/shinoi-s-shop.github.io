<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#131921;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:450px;
margin:30px auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
text-align:center;
}

#avatar{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid #1565c0;
margin:auto;
display:block;
background:#eee;
}

.info{
margin-top:20px;
text-align:left;
}

.info p{
padding:12px 0;
border-bottom:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.editBtn{background:#1565c0;color:#fff;}
.orderBtn{background:#ff9900;color:#fff;}
.homeBtn{background:#2e7d32;color:#fff;}
.logoutBtn{background:#d32f2f;color:#fff;}
</style>
</head>

<body>

<header>My Profile</header>

<div class="container">

<img id="avatar" src="https://via.placeholder.com/120">

<div class="info">
<p><b>Name:</b> <span id="name">Loading...</span></p>
<p><b>Email:</b> <span id="email">Loading...</span></p>
</div>

<a href="edit-profile.html">
<button class="editBtn">✏️ Edit Profile</button>
</a>

<a href="order.html">
<button class="orderBtn">📦 My Orders</button>
</a>

<a href="wishlist.html">
<button class="orderBtn">❤️ Wishlist</button>
</a>

<a href="index.html">
<button class="homeBtn">🏠 Home</button>
</a>

<a href="admin.html">
    <button>🔐 Admin Panel</button>
</a>

<button class="logoutBtn" onclick="logout()">
Logout
</button>

</div>

<script type="module">
  
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwEqOjrZwN56MGRsMrA_BUjHWSnkvmecM",
  authDomain: "shinoi-s-shop.firebaseapp.com",
  projectId: "shinoi-s-shop",
  storageBucket: "shinoi-s-shop.firebasestorage.app",
  messagingSenderId: "349772060842",
  appId: "1:349772060842:web:1dbd365d526c0a28e2d8d3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  await user.reload();

  document.getElementById("name").innerText =
    user.displayName || "No Name";

  document.getElementById("email").innerText =
    user.email;

  if (user.photoURL) {
    document.getElementById("avatar").src =
      user.photoURL;
  } else {
    document.getElementById("avatar").src =
      "https://via.placeholder.com/120";
  }

});

window.logout = async function () {

  await signOut(auth);

  alert("Logout Successful!");

  window.location.href = "login.html";

};

</script>

</body>
</html>
