<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Orders</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#131921;
color:#fff;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:20px auto;
padding:15px;
}

.order{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.order h3{
margin-bottom:10px;
color:#1565c0;
}

.order p{
margin:6px 0;
font-size:16px;
}

.products{
margin-top:10px;
padding-top:10px;
border-top:1px solid #ddd;
}

.product{
padding:8px 0;
border-bottom:1px solid #eee;
}

.status{
display:inline-block;
padding:6px 12px;
border-radius:20px;
background:#ffc107;
color:#000;
font-weight:bold;
margin-top:10px;
}

.back{
display:block;
text-align:center;
margin:20px auto;
width:220px;
padding:12px;
background:#1565c0;
color:#fff;
text-decoration:none;
border-radius:8px;
font-size:18px;
}

.empty{
text-align:center;
font-size:22px;
margin-top:60px;
color:#666;
}

</style>

</head>

<body>

<header>
📦 My Orders
</header>

<div class="container" id="orderList">
</div>

<a href="index.html" class="back">
🏠 Back to Home
</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getDatabase,
  ref,
  get
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwEqOjrZwN56MGRsMrA_BUjHWSnkvmecM",
  authDomain: "shinoi-s-shop.firebaseapp.com",
  databaseURL: "https://shinoi-s-shop-default-rtdb.firebaseio.com",
  projectId: "shinoi-s-shop",
  storageBucket: "shinoi-s-shop.firebasestorage.app",
  messagingSenderId: "349772060842",
  appId: "1:349772060842:web:1dbd365d526c0a28e2d8d3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.viewInvoice = async function(orderId){

  const snapshot = await get(ref(db,"orders/"+orderId));

  if(snapshot.exists()){

    localStorage.setItem(
      "lastOrder",
      JSON.stringify(snapshot.val())
    );

    window.location.href="invoice.html";
  }

};

const currentUser = localStorage.getItem("userUid");
const orderList = document.getElementById("orderList");

const snapshot = await get(ref(db,"orders"));

if(!snapshot.exists()){

  orderList.innerHTML="<div class='empty'>No Orders Found</div>";

}else{

  orderList.innerHTML="";

  snapshot.forEach((child)=>{

    const key=child.key;
    const order=child.val();

    if(order.userUid!==currentUser) return;

    let productsHTML="";

    order.products.forEach(item=>{

      let qty=item.quantity||1;

      productsHTML+=`
      <div class="product">
      <b>${item.name}</b><br>
      Price: ৳${item.price}<br>
      Quantity: ${qty}
      </div>
      `;

    });

    orderList.innerHTML+=`
    <div class="order">

    <h3>Order ID: ${key}</h3>

    <p><b>Date:</b> ${order.date}</p>
    <p><b>Name:</b> ${order.customer.name}</p>
    <p><b>Phone:</b> ${order.customer.phone}</p>
    <p><b>Address:</b> ${order.customer.address}</p>
    <p><b>Payment:</b> ${order.customer.payment}</p>
    <p><b>Grand Total:</b> ৳${order.customer.grandTotal}</p>

    <div class="status">${order.status}</div>

    <div class="products">
    <h4>Products</h4>
    ${productsHTML}
    </div>

    <button onclick="viewInvoice('${key}')"
    style="margin-top:15px;padding:10px 20px;background:#28a745;color:#fff;border:none;border-radius:6px;cursor:pointer;">
    🧾 Invoice
    </button>

    </div>
    `;

  });

  if(orderList.innerHTML===""){
    orderList.innerHTML="<div class='empty'>No Orders Found</div>";
  }

}

 
</script>

</body>
</html>
