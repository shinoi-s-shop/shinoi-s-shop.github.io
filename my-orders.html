<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Orders</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#131921;
color:#fff;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:20px auto;
padding:15px;
}

.order{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.order h3{
margin-bottom:10px;
color:#1565c0;
}

.order p{
margin:6px 0;
font-size:16px;
}

.products{
margin-top:10px;
padding-top:10px;
border-top:1px solid #ddd;
}

.product{
padding:8px 0;
border-bottom:1px solid #eee;
}

.status{
display:inline-block;
padding:6px 12px;
border-radius:20px;
background:#ffc107;
color:#000;
font-weight:bold;
margin-top:10px;
}

.back{
display:block;
text-align:center;
margin:20px auto;
width:220px;
padding:12px;
background:#1565c0;
color:#fff;
text-decoration:none;
border-radius:8px;
font-size:18px;
}

.empty{
text-align:center;
font-size:22px;
margin-top:60px;
color:#666;
}

</style>

</head>

<body>

<header>
📦 My Orders
</header>

<div class="container" id="orderList">
</div>

<a href="index.html" class="back">
🏠 Back to Home
</a>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

let orderList = document.getElementById("orderList");

if(orders.length===0){

orderList.innerHTML=`
<div class="empty">
No Orders Found
</div>
`;

}else{

[...orders].reverse().forEach(order=>{

let productsHTML="";

order.products.forEach(item=>{

let qty=item.quantity || 1;

productsHTML+=`
<div class="product">

<b>${item.name}</b><br>

Price: ৳${item.price}<br>

Quantity: ${qty}<br>

Total: ৳${item.price*qty}

</div>
`;

});

orderList.innerHTML+=`

<div class="order">

<h3>Order ID: ${order.id}</h3>

<p><b>Date:</b> ${order.date}</p>

<p><b>Name:</b> ${order.customer.name}</p>

<p><b>Phone:</b> ${order.customer.phone}</p>

<p><b>Address:</b> ${order.customer.address}</p>

<p><b>Payment:</b> ${order.payment}</p>

<p><b>Shipping:</b> ৳${order.shipping}</p>

<p><b>Grand Total:</b> ৳${order.total}</p>

<div class="status">
${order.status}
</div>

<div class="products">

<h4>Products</h4>

${productsHTML}

</div>

<button
onclick="viewInvoice('${order.id}')"
style="
margin-top:15px;
padding:10px 20px;
background:#28a745;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
">
🧾 Invoice
</button>

</div>

`;

});

}

function viewInvoice(orderId){

let orders=JSON.parse(localStorage.getItem("orders")) || [];

let order=orders.find(o=>o.id===orderId);

if(order){

localStorage.setItem("lastOrder",JSON.stringify(order));

window.location.href="invoice.html";

}

}

</script>
