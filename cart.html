<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Cart</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#131921;
color:#fff;
text-align:center;
padding:15px;
font-size:24px;
font-weight:bold;
}

.container{
max-width:800px;
margin:20px auto;
padding:15px;
}

.item{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.item button{
padding:8px 12px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
}

.remove{
background:#e53935;
color:#fff;
}

.checkout{
width:100%;
padding:15px;
background:#ff9900;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

.home{
display:block;
margin-top:15px;
text-align:center;
text-decoration:none;
font-weight:bold;
color:#1565c0;
}

</style>

</head>

<body>

<header>
🛒 My Cart
</header>

<div class="container">

<div id="cartItems"></div>

<h2 style="margin-top:20px;">
Total: ৳<span id="total">0</span>
</h2>

<button class="checkout" onclick="location.href='checkout.html'">
Proceed to Checkout
</button>

<a href="index.html" class="home">
⬅ Continue Shopping
</a>

</div>

<script src="cart.js"></script>

</body>
</html>
