<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#131921;
color:#fff;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:20px auto;
padding:15px;
}

.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
margin-bottom:20px;
}

.btn{
display:inline-block;
padding:12px 20px;
background:#ff9900;
color:#fff;
text-decoration:none;
border-radius:8px;
margin-right:10px;
margin-bottom:10px;
}

.product{
display:flex;
gap:15px;
align-items:center;
padding:15px;
border-bottom:1px solid #ddd;
}

.product img{
width:80px;
height:80px;
object-fit:cover;
border-radius:8px;
}

.delete{
margin-left:auto;
background:#e53935;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>⚙️ Admin Panel</header>

<div class="container">

<div class="card">

<a href="add-product.html" class="btn">➕ Add Product</a>

<a href="orders-admin.html" class="btn">📦 Manage Orders</a>

<button onclick="logout()">Logout</button>

<script>
function logout(){
localStorage.removeItem("adminLogin");
window.location.href="admin-login.html";
}
</script>

</div>

<div class="card">

<h2>All Products</h2>

<div id="productList"></div>

</div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

let productList = document.getElementById("productList");

function loadProducts(){

    productList.innerHTML = "";

    if(products.length === 0){

        productList.innerHTML = "<p>No products found.</p>";
        return;

    }

    products.forEach((product,index)=>{

        productList.innerHTML += `

        <div class="product">

            <img src="${product.image}" alt="${product.name}">

            <div>
                <h3>${product.name}</h3>
                <p>৳${product.price}</p>
                <small>${product.category}</small>
            </div>

            <button class="delete" onclick="deleteProduct(${index})">
                Delete
            </button>

        </div>

        `;

    });

}

function deleteProduct(index){

    products.splice(index,1);

    localStorage.setItem("products", JSON.stringify(products));

    loadProducts();

}

loadProducts();

</script>
<script>

if(localStorage.getItem("adminLogin")!=="true"){

window.location.href="admin-login.html";

}

</script>
</body>
</html>
