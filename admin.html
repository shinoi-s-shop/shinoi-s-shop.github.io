<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#131921;
color:#fff;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:20px auto;
padding:15px;
}

.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
margin-bottom:20px;
}

.btn{
display:inline-block;
padding:12px 20px;
background:#ff9900;
color:#fff;
text-decoration:none;
border-radius:8px;
margin-right:10px;
margin-bottom:10px;
}

.product{
display:flex;
gap:15px;
align-items:center;
padding:15px;
border-bottom:1px solid #ddd;
}

.product img{
width:80px;
height:80px;
object-fit:cover;
border-radius:8px;
}

.delete{
margin-left:auto;
background:#e53935;
color:#fff;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<h1>🛠 Admin Panel</h1>
</header>

<div class="container">

<h2>Add Product</h2>

<a href="add-product.html">
<button>➕ Add New Product</button>
</a>

<hr style="margin:20px 0;">

<h2>All Products</h2>

<div id="productList">

<p>Loading products...</p>

</div>

</div>


<script>

if(localStorage.getItem("adminLogin")!=="true"){

window.location.href="admin-login.html";

}

</script>
    <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
  getDatabase,
  ref,
  get,
  remove
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCwEqOjrZwN56MGRsMrA_BUjHWSnkvmecM",
  authDomain: "shinoi-s-shop.firebaseapp.com",
  databaseURL: "https://shinoi-s-shop-default-rtdb.firebaseio.com",
  projectId: "shinoi-s-shop",
  storageBucket: "shinoi-s-shop.firebasestorage.app",
  messagingSenderId: "349772060842",
  appId: "1:349772060842:web:1dbd365d526c0a28e2d8d3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

async function loadProducts() {

  const productList = document.getElementById("productList");
  productList.innerHTML = "";

  const snapshot = await get(ref(db, "products"));

  if (!snapshot.exists()) {
    productList.innerHTML = "<p>No Products Found</p>";
    return;
  }

  snapshot.forEach((child) => {

    const key = child.key;
    const product = child.val();

    productList.innerHTML += `
      <div style="border:1px solid #ddd;padding:15px;margin-bottom:15px;border-radius:10px;background:#fff;">
      
        <img src="${product.image}"
             style="width:120px;height:120px;object-fit:cover;border-radius:8px;"><br><br>

        <b>${product.name}</b><br>
        ৳${product.price}<br>
        ${product.category}<br><br>

        <button onclick="deleteProduct('${key}')"
        style="background:red;color:#fff;padding:10px 15px;border:none;border-radius:6px;cursor:pointer;">
        🗑 Delete
        </button>

      </div>
    `;

  });

}

window.deleteProduct = async function(key){

  if(confirm("Delete this product?")){
    await remove(ref(db,"products/"+key));
    loadProducts();
  }

}

loadProducts();

    </script>
</body>
</html>
