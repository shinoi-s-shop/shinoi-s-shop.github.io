<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#131921;
color:#fff;
text-align:center;
padding:15px;
font-size:24px;
font-weight:bold;
}

.container{
max-width:500px;
margin:20px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

h2{
margin-bottom:15px;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

textarea{
height:80px;
resize:none;
}

.total-box{
background:#f8f8f8;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

.total-box p,
.total-box h3{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.total-box h3{
color:#1565c0;
}

button{
width:100%;
padding:15px;
background:#ff9900;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e68a00;
}

#couponMessage{
margin-top:10px;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<header>Checkout</header>

<div class="container">

<h2>Customer Details</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="tel" id="phone" placeholder="Phone Number">

<textarea id="address" placeholder="Delivery Address"></textarea>

<select id="district">
<option value="">Select District</option>
<option value="dhaka">Sirajganj</option>
<option value="outside">Outside Sirajganj</option>
</select>

<select id="payment">
<option value="">Select Payment Method</option>
<option value="Cash on Delivery">Cash on Delivery</option>
<option value="bKash">bKash</option>
<option value="Nagad">Nagad</option>
<option value="Rocket">Rocket</option>
</select>

<div id="paymentBox"></div>

<div class="total-box">

<p>
<span>Product Total</span>
<span>৳<span id="productTotal">0</span></span>
</p>

<p>
<span>Shipping Charge</span>
<span>৳<span id="shipping">0</span></span>
</p>

<p>
<span>Discount</span>
<span>-৳<span id="discountAmount">0</span></span>
</p>

<h3>
<span>Grand Total</span>
<span>৳<span id="grandTotal">0</span></span>
</h3>

</div>

<!-- Coupon System -->

<h3>🎁 Coupon Code</h3>

<input
type="text"
id="couponCode"
placeholder="Enter Coupon Code">

<button
type="button"
id="applyCouponBtn"
onclick="applyCoupon()"
style="background:#28a745;">
Apply Coupon
</button>

<p id="couponMessage"></p>

<button onclick="confirmOrder()">
Confirm Order
</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let productTotal = 0;

let shipping = 0;

let discount = 0;

cart.forEach(item=>{

let qty = item.quantity || 1;

productTotal += Number(item.price) * qty;

});

document.getElementById("productTotal").innerText = productTotal;

document.getElementById("grandTotal").innerText = productTotal;

function updateTotal(){

    let total = productTotal + shipping;

    let discountAmount = (total * discount) / 100;

    let grandTotal = total - discountAmount;

    document.getElementById("discountAmount").innerText =
    discountAmount.toFixed(0);

    document.getElementById("grandTotal").innerText =
    grandTotal.toFixed(0);

}

// Shipping
document.getElementById("district").addEventListener("change",function(){

    shipping = this.value==="dhaka" ? 60 :
               this.value==="outside" ? 120 : 0;

    document.getElementById("shipping").innerText = shipping;

    updateTotal();

});

// Coupon
function applyCoupon(){

    let code = document.getElementById("couponCode")
    .value
    .trim()
    .toUpperCase();

    if(code==="WELCOME10"){

        discount = 10;

        document.getElementById("couponMessage").innerHTML =
        "✅ WELCOME10 Applied (10% OFF)";

    }

    else if(code==="SAVE20"){

        discount = 20;

        document.getElementById("couponMessage").innerHTML =
        "✅ SAVE20 Applied (20% OFF)";

    }

    else if(code==="EID50"){

        discount = 50;

        document.getElementById("couponMessage").innerHTML =
        "✅ EID50 Applied (50% OFF)";

    }

    else{

        discount = 0;

        document.getElementById("couponMessage").innerHTML =
        "❌ Invalid Coupon";

    }

    updateTotal();

}

// Payment
document.getElementById("payment").addEventListener("change",function(){

    let box = document.getElementById("paymentBox");

    if(this.value==="bKash" ||
       this.value==="Nagad" ||
       this.value==="Rocket"){

        box.innerHTML = `

<input id="paymentNumber" type="text" placeholder="${this.value} Number">

<input id="trxid" type="text" placeholder="Transaction ID">

`;

    }else{

        box.innerHTML = "";

    }

});

// Confirm Order
function confirmOrder(){

    let customer={

        name:document.getElementById("name").value.trim(),

        phone:document.getElementById("phone").value.trim(),

        address:document.getElementById("address").value.trim(),

        district:document.getElementById("district").value,

        payment:document.getElementById("payment").value,

        paymentNumber:
document.getElementById("paymentNumber") ?
document.getElementById("paymentNumber").value.trim() : "",

        trxid:
document.getElementById("trxid") ?
document.getElementById("trxid").value.trim() : "",

        shipping:shipping,

        discount:discount,

        grandTotal:Number(document.getElementById("grandTotal").innerText)

    };

    if(
        customer.name==="" ||
        customer.phone==="" ||
        customer.address==="" ||
        customer.district==="" ||
        customer.payment===""
    ){

        alert("Please fill all fields!");
        return;

    }

    if(customer.payment!=="Cash on Delivery"){

        if(
            customer.paymentNumber==="" ||
            customer.trxid===""
        ){

            alert("Enter Payment Number & Transaction ID");
            return;

        }

    }

    localStorage.setItem(
        "customer",
        JSON.stringify(customer)
    );

    window.placeOrder();

}

</script>
<script type="module" src="order.js"></script>

</body>
</html>
