<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Shinoi's Shop</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:350px;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

p{
text-align:center;
margin-top:15px;
}

a{
color:#2563eb;
text-decoration:none;
font-weight:bold;
}
</style>

</head>
<body>

<div class="box">

<h2>Create Account</h2>

<input id="name" type="text" placeholder="Full Name">

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<input id="confirm" type="password" placeholder="Confirm Password">

<button onclick="signup()">
Create Account
</button>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script type="module" src="firebase.js"></script>

</body>
</html>
